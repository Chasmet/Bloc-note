<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1022">
<title>Bloc Noté</title>
<meta name="description" content="Bloc Noté : dossiers, sous-dossiers et plusieurs notes par dossier.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="logo.svg">
<style>
:root{--bg:#081026;--card:#111a2e;--card2:#17213a;--line:#2a3656;--text:#f8fafc;--muted:#a7b0c7;--blue:#6574ff;--blue2:#27d4ff;--red:#ff4d5f;--green:#22c55e;--yellow:#ffd45d;--shadow:#0009}body.light{--bg:#eef2ff;--card:#fff;--card2:#f8fafc;--line:#d8deef;--text:#0f172a;--muted:#64708a;--blue:#4f46e5;--blue2:#0284c7;--red:#dc2626;--green:#16a34a;--yellow:#f59e0b;--shadow:#0002}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at 20% -10%,#27368f 0,#111b43 28%,var(--bg) 68%);background-attachment:fixed}button,input,textarea{font:inherit}button{border:0;background:none;color:inherit}.top{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:52px 1fr 48px 48px 48px;gap:4px;align-items:center;min-height:70px;padding:9px 10px;background:rgba(12,18,38,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}body.light .top{background:rgba(255,255,255,.94)}.ico{height:46px;border-radius:16px;display:grid;place-items:center;font-size:24px}.ico img{width:34px;height:34px}.logoBtn{background:linear-gradient(145deg,#17245a,#0f172a);border:1px solid #5d6cff88;box-shadow:0 0 24px #5364ff55}.plusTop{background:linear-gradient(135deg,var(--blue),#7c3aed);color:white;font-size:30px;font-weight:900}.ico:active,.row:active,.nav button:active,.primary:active,.smallBtn:active,.sheet button:active,.menu button:active{transform:scale(.98);background-color:#ffffff15}h1{margin:0;font-size:21px;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.path{margin-top:5px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.path b{color:#9ba7ff}.search{display:none;padding:10px;background:rgba(12,18,38,.92);border-bottom:1px solid var(--line)}.search.on{display:block}.search input,.dialog input,.titleInput,.bodyInput{width:100%;border:1px solid var(--line);border-radius:18px;background:#0d162b;color:var(--text);outline:0}body.light .search input,body.light .dialog input,body.light .titleInput,body.light .bodyInput{background:#f8fafc}.search input,.dialog input{height:54px;padding:0 15px}.list{padding:10px 0 124px}.hero,.createBox,.row,.editor{margin:12px 14px 0;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015)),var(--card);box-shadow:0 14px 38px #0004}.hero{padding:16px}.heroHead{display:flex;gap:12px;align-items:center}.hero img{width:54px;height:54px;border-radius:17px}.hero h2{margin:0;font-size:25px}.hero p{margin:7px 0 0;color:var(--muted);line-height:1.35}.installLine{margin-top:14px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px;border:1px dashed #6877ff99;border-radius:20px;color:var(--muted)}.installBtn,.primary{min-height:50px;border-radius:18px;padding:0 16px;background:linear-gradient(135deg,var(--blue),#7c3aed);color:white;font-weight:900}.createBox{padding:14px}.createTitle{font-weight:950;font-size:17px;margin-bottom:12px}.createGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary{width:100%;font-size:16px}.row{display:grid;grid-template-columns:54px 1fr 44px;gap:10px;align-items:center;min-height:82px;padding:12px;text-align:left}.icon{width:50px;height:50px;border-radius:17px;display:grid;place-items:center;font-size:26px;background:#ffffff10}.folder{background:rgba(255,212,93,.15)}.rtitle{font-size:19px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{margin-top:4px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub .blue{color:#9ca8ff;font-weight:900}.more{width:42px;height:42px;border-radius:15px;color:var(--muted);font-size:25px}.empty{padding:60px 22px;text-align:center;color:var(--muted);line-height:1.45}.empty b{display:block;color:var(--text);font-size:21px;margin-bottom:8px}.fab{position:fixed;right:18px;bottom:88px;z-index:25;width:68px;height:68px;border-radius:25px;background:linear-gradient(135deg,var(--blue),#7c3aed);color:white;font-size:40px;font-weight:900;box-shadow:0 18px 45px #3142ff66}.nav{position:fixed;left:10px;right:10px;bottom:14px;z-index:24;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px;border:1px solid var(--line);border-radius:24px;background:rgba(12,18,38,.94);backdrop-filter:blur(16px);box-shadow:0 18px 45px #0008}body.light .nav{background:rgba(255,255,255,.94)}.nav button{min-height:50px;border-radius:17px;color:var(--muted);font-size:12px;font-weight:900}.nav b{display:block;font-size:20px}.nav .on{background:linear-gradient(135deg,#243b89,#18285c);color:white}.editor{padding:14px;display:grid;gap:12px}.titleInput{height:58px;padding:0 15px;font-size:23px;font-weight:950}.bodyInput{min-height:48vh;resize:none;padding:15px;font-size:17px;line-height:1.5}.chips{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.smallBtn{min-height:48px;border-radius:16px;background:var(--card2);font-weight:900}.danger{color:var(--red)}.status{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:13px}.okText{color:var(--green);font-weight:900}.shade{display:none;position:fixed;inset:0;z-index:40;background:#0009}.shade.on{display:block}.dialog,.sheet,.menu{display:none;position:fixed;z-index:50;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 55px var(--shadow)}.dialog.on,.sheet.on,.menu.on{display:block}.dialog{left:14px;right:14px;top:50%;transform:translateY(-50%);border-radius:28px;padding:16px}.dialog h2{margin:0 0 8px;font-size:22px}.help{margin:0 0 12px;color:var(--muted);font-size:14px;line-height:1.35}.dacts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.dacts button{min-height:50px;border-radius:17px;background:var(--card2);font-weight:950}.dacts .ok{background:linear-gradient(135deg,var(--blue),#7c3aed);color:white}.sheet{left:0;right:0;bottom:0;border-radius:28px 28px 0 0;padding:14px 14px max(14px,env(safe-area-inset-bottom))}.sheetTitle{padding:8px;color:var(--muted);font-weight:950}.sheet button,.menu button{width:100%;min-height:56px;border-radius:18px;text-align:left;padding:0 12px;font-weight:900;font-size:17px}.menu{top:0;bottom:0;left:0;width:min(86vw,350px);padding:14px}.brand{display:flex;gap:12px;align-items:center;font-size:24px;font-weight:950;padding:8px 4px 16px}.brand img{width:46px;height:46px;border-radius:15px}.toast{display:none;position:fixed;left:14px;right:14px;bottom:150px;z-index:70;padding:13px 14px;border-radius:18px;background:var(--card);border:1px solid var(--line);font-weight:850;box-shadow:0 18px 45px var(--shadow)}.toast.on{display:block}.file{display:none}@media(max-width:380px){.top{grid-template-columns:48px 1fr 44px 44px 44px}.rtitle{font-size:17px}.primary{font-size:14px}.nav button{font-size:11px}}
</style>
</head>
<body>
<header class="top">
<button class="ico logoBtn" id="back" aria-label="Retour"><img src="logo.svg" alt="Bloc Noté"></button>
<div><h1 id="title">Mes dossiers</h1><div class="path" id="path">Accueil</div></div>
<button class="ico plusTop" id="topAdd" aria-label="Créer">+</button>
<button class="ico" id="searchBtn" aria-label="Recherche">🔍</button>
<button class="ico" id="menuBtn" aria-label="Menu">☰</button>
</header>
<div class="search" id="searchBox"><input id="query" type="search" placeholder="Rechercher une note, un dossier, un texte"></div>
<main class="list" id="list"></main>
<button class="fab" id="fab" aria-label="Créer">+</button>
<nav class="nav" id="nav"><button data-view="folder" class="on"><b>⌂</b>Dossiers</button><button data-view="fav"><b>☆</b>Favoris</button><button data-view="recent"><b>◷</b>Récents</button></nav>
<input class="file" id="file" type="file" accept="application/json,.json">
<div class="shade" id="shade"></div>
<section class="dialog" id="dialog"><h2 id="dialogTitle">Créer</h2><p class="help" id="dialogHelp"></p><input id="dialogInput"><div class="dacts"><button id="cancel">Annuler</button><button class="ok" id="validate">Valider</button></div></section>
<section class="sheet" id="sheet"></section>
<nav class="menu" id="menu"><div class="brand"><img src="logo.svg" alt=""><span>Bloc Noté</span></div><button data-menu="newNote">📝 Créer une note</button><button data-menu="newFolder">📁 Créer un dossier</button><button data-menu="home">📁 Mes dossiers</button><button data-menu="all">📝 Toutes les notes</button><button data-menu="install">📲 Installer l’application</button><button data-menu="theme">🌓 Thème clair/sombre</button><button data-menu="export">⬇️ Exporter sauvegarde</button><button data-menu="import">⬆️ Importer sauvegarde</button><button data-menu="reset">🧹 Vider l’application</button></nav>
<div class="toast" id="toast"></div>
<script>
const KEY='bloc-projets-simple-v1';
const $=id=>document.getElementById(id);
const el={body:document.body,back:$('back'),title:$('title'),path:$('path'),topAdd:$('topAdd'),searchBtn:$('searchBtn'),menuBtn:$('menuBtn'),searchBox:$('searchBox'),query:$('query'),list:$('list'),fab:$('fab'),nav:$('nav'),shade:$('shade'),dialog:$('dialog'),dialogTitle:$('dialogTitle'),dialogHelp:$('dialogHelp'),dialogInput:$('dialogInput'),cancel:$('cancel'),validate:$('validate'),sheet:$('sheet'),menu:$('menu'),file:$('file'),toast:$('toast')};
let db=load(),cur='root',opened=null,view='folder',pending=null,saveTimer=null,toastTimer=null,deferredInstall=null;
init();
function init(){migrate();bind();theme();render();if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));window.addEventListener('beforeinstallprompt',ev=>{ev.preventDefault();deferredInstall=ev;toast('Installation disponible avec 📲 dans le menu')});window.addEventListener('appinstalled',()=>{deferredInstall=null;toast('Bloc Noté est installé')})}
function bind(){el.topAdd.onclick=openCreate;el.fab.onclick=openCreate;el.searchBtn.onclick=toggleSearch;el.menuBtn.onclick=()=>openMenu();el.back.onclick=back;el.cancel.onclick=closeAll;el.validate.onclick=submitDialog;el.shade.onclick=closeAll;el.query.oninput=render;el.file.onchange=importFile;el.list.addEventListener('click',onListClick);el.nav.addEventListener('click',ev=>{let b=ev.target.closest('[data-view]');if(b)setView(b.dataset.view)});el.menu.addEventListener('click',ev=>{let b=ev.target.closest('[data-menu]');if(b)menuAction(b.dataset.menu)})}
function starter(){let t=now();let sk={id:id(),kind:'folder',title:'Skano premier',children:[{id:id(),kind:'note',title:'Skano premier ciel de cendre',content:'Ciel de Cendre\nJe marche seul sous un ciel de cendre...',favorite:false,createdAt:t,updatedAt:t}],favorite:false,createdAt:t,updatedAt:t};return{version:4,theme:'dark',root:{id:'root',kind:'folder',title:'Mes dossiers',children:[sk,{id:id(),kind:'folder',title:'Album chk Booba',children:[{id:id(),kind:'note',title:'Idée album',content:'Notes album.',favorite:false,createdAt:t,updatedAt:t}],favorite:false,createdAt:t,updatedAt:t},{id:id(),kind:'folder',title:'Prompt',children:[],favorite:false,createdAt:t,updatedAt:t},{id:id(),kind:'note',title:'Ciel de cendre srt',content:"1 00:00:00,000 --> 00:00:08,440 J'vais marcher seul sous un ciel de cendre",favorite:false,createdAt:t,updatedAt:t}],favorite:false,createdAt:t,updatedAt:t}}}
function empty(){return{version:4,theme:'dark',root:{id:'root',kind:'folder',title:'Mes dossiers',children:[],favorite:false,createdAt:now(),updatedAt:now()}}}
function load(){try{let raw=localStorage.getItem(KEY);if(!raw)return starter();let x=JSON.parse(raw);return x&&x.root?x:empty()}catch{return empty()}}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function migrate(){db.version=4;walk(db.root,n=>{n.favorite=!!n.favorite;n.createdAt=n.createdAt||now();n.updatedAt=n.updatedAt||n.createdAt;if(n.kind==='note')n.content=String(n.content||'');if(n.kind==='folder'&&!Array.isArray(n.children))n.children=[]});save()}
function now(){return new Date().toISOString()}function id(){return'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}
function node(i,n=db.root){if(n.id===i)return n;if(n.kind!=='folder')return null;for(const c of n.children){let r=node(i,c);if(r)return r}return null}
function parent(i,n=db.root,p=null){if(n.id===i)return p;if(n.kind!=='folder')return null;for(const c of n.children){let r=parent(i,c,n);if(r)return r}return null}
function walk(n,cb,p=null,path=[]){cb(n,p,path);if(n.kind==='folder')n.children.forEach(c=>walk(c,cb,n,[...path,n]))}
function pathOf(i){let r=[];walk(db.root,(n,p,path)=>{if(n.id===i)r=[...path,n]});return r}
function folder(){let f=node(cur);return f&&f.kind==='folder'?f:db.root}
function touch(n){n.updatedAt=now();let p=parent(n.id);while(p){p.updatedAt=now();p=parent(p.id)}save()}
function render(){setNav();if(opened)return renderEditor();let q=el.query.value.trim().toLowerCase();if(q)return renderSearch(q);if(view==='fav')return renderFav();if(view==='recent')return renderRecent();if(view==='all')return renderAll();renderFolder()}
function header(title,path){el.title.textContent=title;el.path.innerHTML=path||'Accueil';let home=!opened&&!el.query.value&&view==='folder'&&cur==='root';if(home){el.back.innerHTML='<img src="logo.svg" alt="Bloc Noté">';el.back.className='ico logoBtn';el.back.onclick=installApp}else{el.back.textContent='‹';el.back.className='ico';el.back.onclick=back}}
function setNav(){document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===view&&!opened))}
function renderFolder(){let f=folder(),p=pathOf(f.id).map(x=>x.title).join(' / ');header(f.title,p==='Mes dossiers'?'Accueil':'<b>'+esc(p).replaceAll(' / ','</b> / <b>')+'</b>');el.fab.style.display='grid';el.nav.style.display='grid';el.list.innerHTML='';if(f.id==='root')hero();createBox(f);let items=[...f.children].sort(sort);if(!items.length)emptyBox('Dossier vide','Utilise les boutons “Nouvelle note” ou “Nouveau dossier”.');items.forEach(x=>el.list.append(row(x)))}
function hero(){el.list.insertAdjacentHTML('beforeend','<section class="hero"><div class="heroHead"><img src="logo.svg" alt=""><div><h2>Bloc Noté</h2><p>Organisez vos idées. Écrivez en toute clarté.</p></div></div><div class="installLine"><span>Ajoute l’application sur l’écran d’accueil avec le logo.</span><button class="installBtn" data-action="install">Installer</button></div></section>')}
function createBox(f){el.list.insertAdjacentHTML('beforeend','<section class="createBox"><div class="createTitle">Créer rapidement dans “'+esc(f.title)+'”</div><div class="createGrid"><button class="primary" data-action="newNote">📝 Nouvelle note</button><button class="primary" data-action="newFolder">📁 Nouveau dossier</button></div></section>')}
function renderFav(){header('Favoris','Notes et dossiers favoris');el.fab.style.display='none';el.nav.style.display='grid';el.list.innerHTML='';let a=[];walk(db.root,(n,p,path)=>{if(n.id!=='root'&&n.favorite)a.push({n,path})});if(!a.length)return emptyBox('Aucun favori','Ouvre une note puis appuie sur ⭐.');a.sort((a,b)=>sort(a.n,b.n)).forEach(o=>el.list.append(row(o.n,o.path)))}
function renderRecent(){header('Récents','Dernières modifications');el.fab.style.display='none';el.nav.style.display='grid';el.list.innerHTML='';let a=[];walk(db.root,(n,p,path)=>{if(n.id!=='root')a.push({n,path})});a.sort((a,b)=>new Date(b.n.updatedAt)-new Date(a.n.updatedAt));if(!a.length)return emptyBox('Aucun élément','Tes notes récentes apparaîtront ici.');a.slice(0,40).forEach(o=>el.list.append(row(o.n,o.path)))}
function renderAll(){header('Toutes les notes','Liste complète');el.fab.style.display='none';el.nav.style.display='none';el.list.innerHTML='';let a=[];walk(db.root,(n,p,path)=>{if(n.kind==='note')a.push({n,path})});if(!a.length)return emptyBox('Aucune note','Crée une note avec le bouton +.');a.sort((a,b)=>sort(a.n,b.n)).forEach(o=>el.list.append(row(o.n,o.path)))}
function renderSearch(q){header('Recherche','Résultats');el.fab.style.display='none';el.nav.style.display='none';el.list.innerHTML='';let a=[];walk(db.root,(n,p,path)=>{if(n.id==='root')return;let text=(n.title+' '+(n.content||'')+' '+path.map(x=>x.title).join(' ')).toLowerCase();if(text.includes(q))a.push({n,path})});if(!a.length)return emptyBox('Rien trouvé','Essaie un autre mot.');a.sort((a,b)=>sort(a.n,b.n)).forEach(o=>el.list.append(row(o.n,o.path)))}
function renderEditor(){let n=node(opened);if(!n){opened=null;return render()}let p=pathOf(n.id).slice(1,-1).map(x=>x.title).join(' / ');header(n.title,p?'📁 <b>'+esc(p)+'</b>':'Note');el.fab.style.display='none';el.nav.style.display='none';el.list.innerHTML='';let s=document.createElement('section');s.className='editor';s.innerHTML='<input class="titleInput" value="'+attr(n.title)+'"><div class="chips"><button class="smallBtn" data-edit="fav">'+(n.favorite?'⭐ Favori':'☆ Favori')+'</button><button class="smallBtn" data-edit="copy">📋 Copier</button><button class="smallBtn danger" data-edit="delete">🗑 Suppr.</button></div><textarea class="bodyInput">'+esc(n.content||'')+'</textarea><div class="status"><span class="okText">✓ Sauvegarde automatique</span><span id="saveTime">Modifiée maintenant</span></div>';el.list.append(s);let title=s.querySelector('.titleInput'),body=s.querySelector('.bodyInput');let auto=()=>{n.title=title.value.trim()||'Note sans titre';n.content=body.value;clearTimeout(saveTimer);saveTimer=setTimeout(()=>{touch(n);header(n.title,p?'📁 <b>'+esc(p)+'</b>':'Note');$('saveTime').textContent='Modifiée à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})},160)};title.oninput=auto;body.oninput=auto;s.onclick=ev=>{let b=ev.target.closest('[data-edit]');if(!b)return;if(b.dataset.edit==='fav'){n.favorite=!n.favorite;touch(n);renderEditor()}if(b.dataset.edit==='copy')copyText(n);if(b.dataset.edit==='delete')delItem(n.id)}}
function row(x,path){let r=document.createElement('div');r.className='row';r.dataset.open=x.id;r.innerHTML='<div class="icon '+(x.kind==='folder'?'folder':'')+'">'+(x.kind==='folder'?'📁':'📝')+'</div><div><div class="rtitle">'+(x.favorite?'⭐ ':'')+esc(x.title)+'</div><div class="sub">'+(path?esc(path.map(p=>p.title).join(' / ')):(x.kind==='folder'?count(x):esc(preview(x))))+'</div></div><button class="more" data-more="'+x.id+'">⋮</button>';return r}
function onListClick(ev){let act=ev.target.closest('[data-action]');if(act){ev.stopPropagation();if(act.dataset.action==='newNote')newNote(false);if(act.dataset.action==='newFolder')newFolder();if(act.dataset.action==='install')installApp();return}let more=ev.target.closest('[data-more]');if(more){ev.stopPropagation();itemSheet(more.dataset.more);return}let row=ev.target.closest('[data-open]');if(row)open(row.dataset.open)}
function open(i){let x=node(i);if(!x)return;closeAll();view='folder';el.query.value='';el.searchBox.classList.remove('on');if(x.kind==='folder'){cur=i;opened=null}else opened=i;render()}
function back(){if(opened){let p=parent(opened);opened=null;cur=p?p.id:'root';view='folder';return render()}if(el.query.value){el.query.value='';return render()}if(view!=='folder'){view='folder';cur='root';return render()}if(cur!=='root'){let p=parent(cur);cur=p?p.id:'root';render()}}
function setView(v){view=v;opened=null;if(v==='folder')cur='root';el.query.value='';el.searchBox.classList.remove('on');render()}
function toggleSearch(){closeAll();el.searchBox.classList.toggle('on');if(el.searchBox.classList.contains('on')){opened=null;setTimeout(()=>el.query.focus(),40)}else el.query.value='';render()}
function openCreate(){sheet('Créer dans “'+folder().title+'”',[["📝 Nouvelle note",()=>newNote(false)],["📝 Nouvelle note et ouvrir",()=>newNote(true)],["📁 Nouveau dossier",newFolder]])}
function newNote(openAfter=false){closeAll();dialog('Titre de la note','Tu peux créer plusieurs notes dans ce dossier.','Exemple : Épisode 1',title=>{let f=folder(),n={id:id(),kind:'note',title,content:'',favorite:false,createdAt:now(),updatedAt:now()};f.children.push(n);touch(f);if(openAfter)opened=n.id;toast(openAfter?'Note créée et ouverte':'Note créée');render()})}
function newFolder(){closeAll();dialog('Nom du dossier','Tu peux créer des sous-dossiers.','Exemple : Saison 1',name=>{let f=folder();f.children.push({id:id(),kind:'folder',title:name,children:[],favorite:false,createdAt:now(),updatedAt:now()});touch(f);toast('Dossier créé');render()})}
function dialog(t,h,ph,fn,value=''){pending=fn;el.dialogTitle.textContent=t;el.dialogHelp.textContent=h||'';el.dialogInput.value=value;el.dialogInput.placeholder=ph||'';el.shade.classList.add('on');el.dialog.classList.add('on');setTimeout(()=>{el.dialogInput.focus();el.dialogInput.select()},50)}
function submitDialog(){let v=el.dialogInput.value.trim();if(!v)return el.dialogInput.focus();let fn=pending;closeAll();if(fn)fn(v)}
function itemSheet(i){let x=node(i);if(!x)return;let a=[[x.kind==='folder'?'📂 Ouvrir':'📝 Ouvrir',()=>open(i)],[x.favorite?'☆ Retirer des favoris':'⭐ Mettre en favori',()=>toggleFav(i)],["✏️ Renommer",()=>rename(i)]];if(x.kind==='folder')a.push(["📝 Créer une note dedans",()=>{open(i);setTimeout(()=>newNote(false),30)}],["📁 Créer un sous-dossier",()=>{open(i);setTimeout(newFolder,30)}],["📄 Dupliquer le dossier",()=>copyFolder(i)]);if(x.kind==='note')a.push(["📄 Dupliquer la note",()=>copyNote(i)],["📋 Copier le texte",()=>copyText(x)]);a.push(["🗑️ Supprimer",()=>delItem(i),'danger']);sheet(x.title,a)}
function sheet(t,items){el.sheet.innerHTML='<div class="sheetTitle">'+esc(t)+'</div>';items.forEach(([txt,fn,cls])=>{let b=document.createElement('button');b.textContent=txt;b.className=cls||'';b.onclick=fn;el.sheet.append(b)});let c=document.createElement('button');c.textContent='Annuler';c.onclick=closeAll;el.sheet.append(c);el.shade.classList.add('on');el.sheet.classList.add('on')}
function openMenu(){closeAll();el.shade.classList.add('on');el.menu.classList.add('on')}
function menuAction(a){closeAll();if(a==='newNote')return newNote(false);if(a==='newFolder')return newFolder();if(a==='home')return setView('folder');if(a==='all'){view='all';opened=null;render()}if(a==='install')installApp();if(a==='theme'){db.theme=db.theme==='light'?'dark':'light';theme();save();render()}if(a==='export')exportFile();if(a==='import')el.file.click();if(a==='reset')reset()}
function toggleFav(i){let x=node(i);x.favorite=!x.favorite;touch(x);closeAll();render()}
function rename(i){let x=node(i);closeAll();dialog('Renommer','','Nouveau nom',name=>{x.title=name;touch(x);render()},x.title)}
function cloneNode(n){let c=JSON.parse(JSON.stringify(n));function renew(x){x.id=id();x.favorite=false;x.createdAt=now();x.updatedAt=now();if(x.kind==='folder')x.children.forEach(renew)}renew(c);c.title=n.title+' - copie';return c}
function copyNote(i){let n=node(i),p=parent(i);if(!n||!p)return;p.children.push(cloneNode(n));touch(p);closeAll();toast('Note dupliquée');render()}
function copyFolder(i){let n=node(i),p=parent(i);if(!n||!p)return;p.children.push(cloneNode(n));touch(p);closeAll();toast('Dossier dupliqué');render()}
async function copyText(n){try{await navigator.clipboard.writeText(n.content||'');toast('Texte copié')}catch{toast('Copie impossible')}closeAll()}
function delItem(i){let x=node(i),p=parent(i);if(!x||!p)return;if(!confirm(x.kind==='folder'?'Supprimer ce dossier et tout son contenu ?':'Supprimer cette note ?'))return;p.children=p.children.filter(c=>c.id!==i);touch(p);if(opened===i)opened=null;cur=p.id;view='folder';closeAll();render()}
function installApp(){closeAll();if(deferredInstall){deferredInstall.prompt();deferredInstall.userChoice.finally(()=>deferredInstall=null);return}sheet('Installer Bloc Noté',[["1. Appuie sur les 3 points de Chrome",()=>{}],["2. Choisis Ajouter à l’écran d’accueil",()=>{}],["3. Le logo Bloc Noté apparaîtra",()=>{}]])}
function exportFile(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='bloc-note-sauvegarde-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url)}
function importFile(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let x=JSON.parse(r.result);if(!x.root||x.root.kind!=='folder')return alert('Sauvegarde invalide.');if(!confirm('Remplacer toutes les notes par cette sauvegarde ?'))return;db=x;cur='root';opened=null;view='folder';migrate();theme();render()}catch{alert('Impossible de lire ce fichier.')}finally{el.file.value=''}};r.readAsText(f)}
function reset(){if(!confirm('Vider toute l’application ? Fais une sauvegarde avant si besoin.'))return;db=empty();cur='root';opened=null;view='folder';save();render()}
function closeAll(){el.shade.classList.remove('on');el.dialog.classList.remove('on');el.sheet.classList.remove('on');el.menu.classList.remove('on')}
function theme(){el.body.classList.toggle('light',db.theme==='light')}
function toast(m){clearTimeout(toastTimer);el.toast.textContent=m;el.toast.classList.add('on');toastTimer=setTimeout(()=>el.toast.classList.remove('on'),2200)}
function count(f){let d=f.children.filter(x=>x.kind==='folder').length,n=f.children.filter(x=>x.kind==='note').length,a=[];if(d)a.push('<span class="blue">'+d+'</span> dossier'+(d>1?'s':''));if(n)a.push('<span class="blue">'+n+'</span> note'+(n>1?'s':''));return a.join(' · ')||'Vide'}
function preview(n){return(n.content||'').replace(/\s+/g,' ').trim()||'Note vide'}
function sort(a,b){if(a.kind!==b.kind)return a.kind==='folder'?-1:1;return new Date(b.updatedAt)-new Date(a.updatedAt)}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function attr(s){return esc(s).replace(/`/g,'&#96;')}
</script>
</body>
</html>
