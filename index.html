<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>Bloc Noté</title>
<style>
:root{--bg:#0f172a;--card:#111827;--card2:#172033;--soft:#1f2937;--text:#f9fafb;--muted:#aab3c5;--line:#293447;--blue:#6366f1;--green:#22c55e;--red:#ef4444;--shadow:#0008}body.light{--bg:#f3f4f6;--card:#fff;--card2:#f8fafc;--soft:#e8ecff;--text:#111827;--muted:#606b80;--line:#d8deea;--blue:#4f46e5;--green:#16a34a;--red:#dc2626;--shadow:#0002}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}button,input,textarea{font:inherit}button{border:0;background:none;color:inherit}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:46px 1fr 46px 46px;gap:2px;align-items:center;min-height:62px;padding:8px;background:var(--card);border-bottom:1px solid var(--line)}.ico{width:44px;height:44px;border-radius:14px;font-size:23px}.ico:active,.row:active,.act:active,.menu button:active,.pill:active{background:var(--soft)}h1{margin:0;font-size:20px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.path{margin-top:3px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.search{display:none;background:var(--card);padding:10px;border-bottom:1px solid var(--line)}.search.on{display:block}.search input,.name,.ntitle,.nbody{width:100%;border:1px solid var(--line);border-radius:16px;background:var(--soft);color:var(--text);outline:0}.search input,.name{height:50px;padding:0 14px}.list{padding-bottom:105px}.row{width:100%;display:grid;grid-template-columns:48px 1fr 44px;align-items:center;min-height:74px;padding:9px 8px 9px 14px;border-bottom:1px solid var(--line);text-align:left;background:transparent}.emoji{font-size:28px}.rtitle{font-size:19px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{margin-top:4px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.more{width:42px;height:42px;border-radius:14px;color:var(--muted);font-size:24px}.fab{position:fixed;right:18px;bottom:22px;z-index:6;width:64px;height:64px;border-radius:22px;background:var(--blue);color:white;font-size:34px;box-shadow:0 18px 45px var(--shadow)}.empty{padding:58px 22px;text-align:center;color:var(--muted);line-height:1.45}.empty b{display:block;color:var(--text);font-size:21px;margin-bottom:8px}.hint{margin:10px 14px 0;padding:12px;border:1px solid var(--line);border-radius:18px;background:var(--card2);color:var(--muted);font-size:13px;line-height:1.35}.editor{padding:14px;display:grid;gap:12px}.ntitle{height:54px;padding:0 14px;font-size:21px;font-weight:850}.nbody{min-height:calc(100vh - 245px);resize:none;padding:14px;font-size:17px;line-height:1.45}.twobtn{display:grid;grid-template-columns:1fr 1fr;gap:10px}.threebtn{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.pill{min-height:48px;border-radius:16px;background:var(--soft);font-weight:800}.okbg{background:var(--blue);color:white}.status{color:var(--muted);font-size:13px}.shade{display:none;position:fixed;inset:0;z-index:10;background:#0008}.shade.on{display:block}.sheet,.dialog,.menu{display:none;position:fixed;z-index:11;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 45px var(--shadow)}.sheet.on,.dialog.on,.menu.on{display:block}.sheet{left:0;right:0;bottom:0;border-radius:24px 24px 0 0;padding:12px 12px max(12px,env(safe-area-inset-bottom))}.st{color:var(--muted);font-size:14px;font-weight:850;padding:8px}.act{width:100%;min-height:54px;border-radius:16px;text-align:left;padding:0 12px;font-weight:800;font-size:17px}.danger{color:var(--red)}.success{color:var(--green)}.menu{top:0;bottom:0;left:0;width:min(84vw,340px);padding:14px}.brand{font-size:23px;font-weight:950;padding:10px 4px 16px}.menu button{width:100%;min-height:54px;border-radius:16px;text-align:left;padding:0 10px;font-weight:800}.dialog{left:14px;right:14px;top:50%;transform:translateY(-50%);border-radius:24px;padding:16px}.dialog h2{margin:0 0 8px;font-size:20px}.small{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.35}.dacts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.dacts button{min-height:48px;border-radius:16px;background:var(--soft);font-weight:850}.dacts .ok{background:var(--blue);color:white}.file{display:none}.toast{position:fixed;left:14px;right:14px;bottom:96px;z-index:30;display:none;padding:12px 14px;border-radius:16px;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 45px var(--shadow);color:var(--text);font-weight:750}.toast.on{display:block}.badge{display:inline-flex;align-items:center;gap:6px;margin-left:6px;padding:3px 8px;border-radius:999px;background:var(--soft);color:var(--muted);font-size:12px;font-weight:800}
</style>
</head>
<body>
<header class="top">
<button class="ico" id="back" aria-label="Retour">‹</button>
<div><h1 id="title">Mes dossiers</h1><div class="path" id="path">Accueil</div></div>
<button class="ico" id="sbtn" aria-label="Recherche">🔍</button><button class="ico" id="mbtn" aria-label="Menu">☰</button>
</header>
<div class="search" id="sbox"><input id="q" type="search" placeholder="Rechercher une note, un dossier, un texte"></div>
<main class="list" id="list"></main>
<button class="fab" id="add" aria-label="Créer">+</button>
<input class="file" id="file" type="file" accept="application/json,.json">
<div class="shade" id="shade"></div>
<nav class="menu" id="menu"><div class="brand">Bloc Noté</div><button data-m="home">📁 Mes dossiers</button><button data-m="fav">⭐ Favoris</button><button data-m="allnotes">📝 Toutes les notes</button><button data-m="theme">🌓 Thème clair/sombre</button><button data-m="export">⬇️ Exporter sauvegarde</button><button data-m="import">⬆️ Importer sauvegarde</button><button data-m="reset">🧹 Vider l’application</button></nav>
<section class="sheet" id="sheet"></section>
<section class="dialog" id="dialog"><h2 id="dtitle">Créer</h2><p class="small" id="dhelp"></p><input class="name" id="dinput"><div class="dacts"><button id="cancel">Annuler</button><button class="ok" id="ok">Valider</button></div></section>
<div class="toast" id="toast"></div>
<script>
const KEY="bloc-projets-simple-v1";
const $=id=>document.getElementById(id);
const e={body:document.body,back:$('back'),title:$('title'),path:$('path'),sbtn:$('sbtn'),mbtn:$('mbtn'),sbox:$('sbox'),q:$('q'),list:$('list'),add:$('add'),shade:$('shade'),sheet:$('sheet'),menu:$('menu'),dialog:$('dialog'),dtitle:$('dtitle'),dhelp:$('dhelp'),dinput:$('dinput'),cancel:$('cancel'),ok:$('ok'),file:$('file'),toast:$('toast')};
let db=load(),cur="root",note=null,view="folder",send=null,timer=null;
init();
function init(){migrate();theme();render();e.back.onclick=back;e.sbtn.onclick=search;e.mbtn.onclick=()=>openMenu();e.add.onclick=createSheet;e.shade.onclick=closeAll;e.cancel.onclick=closeAll;e.ok.onclick=submit;e.q.oninput=render;e.file.onchange=importFile;document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>menuAction(b.dataset.m));}
function empty(){return{version:2,theme:"dark",root:{id:"root",kind:"folder",title:"Mes dossiers",children:[],favorite:false,createdAt:now(),updatedAt:now()}}}
function migrate(){if(!db.version)db.version=2;walk(db.root,n=>{if(!n.createdAt)n.createdAt=now();if(!n.updatedAt)n.updatedAt=n.createdAt;if(typeof n.favorite!=="boolean")n.favorite=false;if(n.kind==="note"&&typeof n.content!=="string")n.content="";if(n.kind==="folder"&&!Array.isArray(n.children))n.children=[]});save()}
function load(){try{let x=JSON.parse(localStorage.getItem(KEY));return x&&x.root?x:empty()}catch{return empty()}}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function now(){return new Date().toISOString()}function id(){return"id-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8)}
function node(i,n=db.root){if(n.id===i)return n;if(n.kind!=="folder")return null;for(const c of n.children){const f=node(i,c);if(f)return f}return null}
function parent(i,n=db.root,p=null){if(n.id===i)return p;if(n.kind!=="folder")return null;for(const c of n.children){const f=parent(i,c,n);if(f)return f}return null}
function walk(n,cb,p=null,path=[]){cb(n,p,path);if(n.kind==="folder")n.children.forEach(c=>walk(c,cb,n,[...path,n]))}
function pathOf(i){let r=[];walk(db.root,(n,p,path)=>{if(n.id===i)r=[...path,n]});return r}
function folder(){let n=node(cur);return n&&n.kind==="folder"?n:db.root}function touch(n){n.updatedAt=now();let p=parent(n.id);while(p){p.updatedAt=now();p=parent(p.id)}save()}
function head(t,p){e.title.textContent=t;e.path.textContent=p||"Accueil"}
function render(){if(note)return renderNote();let q=e.q.value.trim().toLowerCase();if(q)return renderSearch(q);if(view==="fav")return renderFav();if(view==="allnotes")return renderAllNotes();view="folder";renderFolder()}
function renderFolder(){let f=folder(),p=pathOf(f.id).map(x=>x.title).join(" / ");head(f.title,p==="Mes dossiers"?"Accueil":p);e.add.style.display="grid";e.list.innerHTML="";if(f.id!=="root")hint("Dans ce dossier, tu peux créer autant de notes et de sous-dossiers que tu veux avec le bouton +.");let items=[...f.children].sort(sort);if(!items.length)return emptyBox("Dossier vide","Appuie sur + pour créer une note ou un sous-dossier.");items.forEach(x=>e.list.append(row(x)))}
function renderFav(){head("Favoris","Notes et dossiers favoris");e.add.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id!=="root"&&n.favorite)a.push({n,path})});if(!a.length)return emptyBox("Aucun favori","Ouvre une note ou un dossier puis appuie sur ⭐.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderAllNotes(){head("Toutes les notes","Liste complète");e.add.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.kind==="note")a.push({n,path})});if(!a.length)return emptyBox("Aucune note","Crée une note dans un dossier avec le bouton +.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderSearch(q){head("Recherche","Résultats");e.add.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id==="root")return;let txt=(n.title+" "+(n.content||"")+" "+path.map(x=>x.title).join(" ")).toLowerCase();if(txt.includes(q))a.push({n,path})});if(!a.length)return emptyBox("Rien trouvé","Essaie un autre mot.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderNote(){let n=node(note);if(!n){note=null;return render()}head(n.title,pathOf(n.id).map(x=>x.title).join(" / "));e.add.style.display="none";e.list.innerHTML="";let box=document.createElement("section");box.className="editor";let title=document.createElement("input");title.className="ntitle";title.value=n.title;let body=document.createElement("textarea");body.className="nbody";body.value=n.content||"";let tools=document.createElement("div");tools.className="threebtn";let star=btn("pill",n.favorite?"⭐ Favori":"☆ Favori");star.onclick=()=>{n.favorite=!n.favorite;touch(n);renderNote()};let copy=btn("pill","Copier");copy.onclick=()=>copyText(n);let del=btn("pill danger","Suppr.");del.onclick=()=>delItem(n.id);let st=document.createElement("div");st.className="status";st.textContent="Sauvegarde automatique";let auto=()=>{n.title=title.value.trim()||"Note sans titre";n.content=body.value;clearTimeout(timer);timer=setTimeout(()=>{touch(n);head(n.title,pathOf(n.id).map(x=>x.title).join(" / "));st.textContent="Sauvegardé à "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})},180)};title.oninput=auto;body.oninput=auto;tools.append(star,copy,del);box.append(title,body,tools,st);e.list.append(box)}
function row(x,path){let r=document.createElement("button");r.className="row";r.onclick=()=>open(x.id);let ic=document.createElement("div");ic.className="emoji";ic.textContent=x.kind==="folder"?"📁":"📝";let mid=document.createElement("div");let t=document.createElement("div");t.className="rtitle";t.textContent=(x.favorite?"⭐ ":"")+x.title;let s=document.createElement("div");s.className="sub";s.textContent=path?path.map(p=>p.title).join(" / "):x.kind==="folder"?count(x):preview(x);let m=btn("more","⋮");m.onclick=ev=>{ev.stopPropagation();itemSheet(x.id)};mid.append(t,s);r.append(ic,mid,m);return r}
function preview(n){return(n.content||"").replace(/\s+/g," ").trim()||"Note vide"}
function btn(c,t){let b=document.createElement("button");b.className=c;b.textContent=t;return b}
function hint(s){let d=document.createElement("div");d.className="hint";d.textContent=s;e.list.append(d)}
function emptyBox(t,s){let d=document.createElement("div");d.className="empty";d.innerHTML="<b></b><span></span>";d.querySelector("b").textContent=t;d.querySelector("span").textContent=s;e.list.append(d)}
function count(f){let d=f.children.filter(x=>x.kind==="folder").length,n=f.children.filter(x=>x.kind==="note").length,a=[];if(d)a.push(d+" dossier"+(d>1?"s":""));if(n)a.push(n+" note"+(n>1?"s":""));return a.join(" · ")||"Vide"}
function sort(a,b){if(a.kind!==b.kind)return a.kind==="folder"?-1:1;return new Date(b.updatedAt)-new Date(a.updatedAt)}
function open(i){let x=node(i);if(!x)return;closeAll();view="folder";e.q.value="";e.sbox.classList.remove("on");if(x.kind==="folder"){cur=i;note=null}else note=i;render()}
function back(){if(note){let p=parent(note);note=null;cur=p?p.id:"root";view="folder";return render()}if(view!=="folder"){view="folder";cur="root";return render()}if(e.q.value){e.q.value="";return render()}if(cur!=="root"){let p=parent(cur);cur=p?p.id:"root";render()}}
function search(){closeAll();e.sbox.classList.toggle("on");if(e.sbox.classList.contains("on")){view="folder";note=null;setTimeout(()=>e.q.focus(),50)}else e.q.value="";render()}
function createSheet(){let f=folder();sheet("Créer dans “"+f.title+"”",[["📝 Nouvelle note",()=>newNote(false)],["📝 Nouvelle note et ouvrir",()=>newNote(true)],["📁 Nouveau dossier",newFolder]])}
function newFolder(){closeAll();dialog("Nom du dossier","Exemple : Saison 1","",name=>{let f=folder();f.children.push({id:id(),kind:"folder",title:name,children:[],favorite:false,createdAt:now(),updatedAt:now()});touch(f);toast("Dossier créé");render()})}
function newNote(openAfter=false){closeAll();dialog("Titre de la note","Exemple : Épisode 1","",title=>{let f=folder(),n={id:id(),kind:"note",title,content:"",favorite:false,createdAt:now(),updatedAt:now()};f.children.push(n);touch(f);if(openAfter)note=n.id;toast(openAfter?"Note créée et ouverte":"Note créée. Tu peux en créer une autre avec +");render()})}
function itemSheet(i){let x=node(i);if(!x)return;let a=[[x.kind==="folder"?"📂 Ouvrir":"📝 Ouvrir",()=>open(i)],[x.favorite?"☆ Retirer des favoris":"⭐ Mettre en favori",()=>toggleFav(i)],["✏️ Renommer",()=>rename(i)]];if(x.kind==="folder")a.push(["📝 Créer une note dedans",()=>{open(i);setTimeout(()=>newNote(false),40)}],["📁 Créer un sous-dossier",()=>{open(i);setTimeout(newFolder,40)}],["📄 Dupliquer le dossier",()=>copyFolder(i)]);if(x.kind==="note")a.push(["📄 Dupliquer la note",()=>copyNote(i)],["📋 Copier le texte",()=>copyText(x)]);a.push(["🗑️ Supprimer",()=>delItem(i),"danger"]);sheet(x.title,a)}
function sheet(t,a){e.sheet.innerHTML="";let st=document.createElement("div");st.className="st";st.textContent=t;e.sheet.append(st);a.forEach(([txt,fn,d])=>{let b=btn("act "+(d||""),txt);b.onclick=fn;e.sheet.append(b)});let c=btn("act","Annuler");c.onclick=closeAll;e.sheet.append(c);e.shade.classList.add("on");e.sheet.classList.add("on")}
function toggleFav(i){let x=node(i);if(!x)return;x.favorite=!x.favorite;touch(x);closeAll();render()}
function rename(i){let x=node(i);if(!x)return;closeAll();dialog("Renommer","","",name=>{x.title=name;touch(x);render() },x.title)}
function cloneNode(n){let c=JSON.parse(JSON.stringify(n));function renew(x){x.id=id();x.favorite=false;x.createdAt=now();x.updatedAt=now();if(x.kind==="folder")x.children.forEach(renew)}renew(c);c.title=n.title+" - copie";return c}
function copyNote(i){let n=node(i),p=parent(i);if(!n||!p)return;p.children.push(cloneNode(n));touch(p);closeAll();toast("Note dupliquée");render()}
function copyFolder(i){let n=node(i),p=parent(i);if(!n||!p)return;p.children.push(cloneNode(n));touch(p);closeAll();toast("Dossier dupliqué avec ses notes");render()}
async function copyText(n){let txt=n.content||"";try{await navigator.clipboard.writeText(txt);toast("Texte copié")}catch{toast("Copie impossible sur ce navigateur")}closeAll()}
function delItem(i){let x=node(i),p=parent(i);if(!x||!p)return;if(!confirm(x.kind==="folder"?"Supprimer ce dossier et tout son contenu ?":"Supprimer cette note ?"))return;p.children=p.children.filter(c=>c.id!==i);touch(p);if(note===i)note=null;cur=p.id;view="folder";closeAll();render()}
function dialog(t,help,v,fn,preset){send=fn;e.dtitle.textContent=t;e.dhelp.textContent=help||"";e.dinput.value=preset||v||"";e.dinput.placeholder=v||"";e.shade.classList.add("on");e.dialog.classList.add("on");setTimeout(()=>{e.dinput.focus();e.dinput.select()},50)}
function submit(){let v=e.dinput.value.trim();if(!v)return e.dinput.focus();let fn=send;closeAll();if(fn)fn(v)}
function openMenu(){closeAll();e.shade.classList.add("on");e.menu.classList.add("on")}
function menuAction(a){closeAll();if(a==="home"){view="folder";note=null;cur="root";e.q.value="";e.sbox.classList.remove("on");render()}if(a==="fav"){view="fav";note=null;e.q.value="";e.sbox.classList.remove("on");render()}if(a==="allnotes"){view="allnotes";note=null;e.q.value="";e.sbox.classList.remove("on");render()}if(a==="theme"){db.theme=db.theme==="light"?"dark":"light";theme();save();render()}if(a==="export")exportFile();if(a==="import")e.file.click();if(a==="reset")reset()}
function theme(){e.body.classList.toggle("light",db.theme==="light")}
function exportFile(){let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="bloc-note-sauvegarde-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url)}
function importFile(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let x=JSON.parse(r.result);if(!x.root||x.root.kind!=="folder")return alert("Sauvegarde invalide.");if(!confirm("Remplacer toutes les notes par cette sauvegarde ?"))return;db=x;cur="root";note=null;view="folder";save();migrate();theme();render()}catch{alert("Impossible de lire ce fichier.")}finally{e.file.value=""}};r.readAsText(f)}
function reset(){if(!confirm("Vider toute l’application ? Fais une sauvegarde avant si besoin."))return;db=empty();cur="root";note=null;view="folder";save();theme();render()}
function closeAll(){e.shade.classList.remove("on");e.sheet.classList.remove("on");e.menu.classList.remove("on");e.dialog.classList.remove("on")}
function toast(msg){clearTimeout(timer);e.toast.textContent=msg;e.toast.classList.add("on");timer=setTimeout(()=>e.toast.classList.remove("on"),2200)}
</script>
</body>
</html>
