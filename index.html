<style>
:root{--bg:#070b18;--bg2:#101832;--card:#101827;--card2:#151f35;--soft:#1d2942;--text:#f8fafc;--muted:#9aa8c3;--line:#26334f;--blue:#6574ff;--blue2:#28d7ff;--yellow:#ffd45d;--green:#22c55e;--red:#ff4d5f;--shadow:#0009;--radius:22px}body.light{--bg:#eef2ff;--bg2:#f8fafc;--card:#fff;--card2:#f8fafc;--soft:#e9edff;--text:#0f172a;--muted:#5d6b85;--line:#d8deef;--blue:#4f46e5;--blue2:#0284c7;--yellow:#f59e0b;--green:#16a34a;--red:#dc2626;--shadow:#0002}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%}body{margin:0;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at 15% -10%,#1d2b78 0,#0b1022 34%,var(--bg) 70%);background-attachment:fixed}button,input,textarea{font:inherit}button{border:0;background:none;color:inherit}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:48px 1fr 44px 44px 44px;gap:4px;align-items:center;min-height:68px;padding:9px 10px;background:linear-gradient(180deg,rgba(16,24,39,.96),rgba(16,24,39,.88));backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}body.light .top{background:rgba(255,255,255,.92)}.ico{width:44px;height:44px;border-radius:16px;font-size:23px;display:grid;place-items:center}.ico:active,.row:active,.act:active,.menu button:active,.pill:active,.quickBtn:active,.tab:active{background:var(--soft)}.logoTop{background:linear-gradient(145deg,#16235a,#111827);border:1px solid #4354ff66;box-shadow:0 0 22px #304cff40}.logoTop img{width:30px;height:30px}.installTop{font-size:22px;color:var(--blue2)}h1{margin:0;font-size:20px;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.path{margin-top:4px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.path b{color:#8ea0ff;font-weight:800}.search{display:none;background:var(--card);padding:10px;border-bottom:1px solid var(--line)}.search.on{display:block}.search input,.name,.ntitle,.nbody{width:100%;border:1px solid var(--line);border-radius:18px;background:rgba(29,41,66,.9);color:var(--text);outline:0}.search input,.name{height:52px;padding:0 15px}.hero{margin:14px 14px 8px;padding:16px;border:1px solid var(--line);border-radius:26px;background:linear-gradient(135deg,rgba(101,116,255,.18),rgba(40,215,255,.08)),var(--card);box-shadow:0 18px 55px var(--shadow)}.heroTitle{display:flex;gap:12px;align-items:center}.heroTitle img{width:48px;height:48px;border-radius:15px}.hero h2{margin:0;font-size:22px}.hero p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.35}.installCard{margin-top:12px;display:none;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px dashed #6d7cff88;border-radius:18px;background:rgba(101,116,255,.10)}.installCard.on{display:flex}.installCard span{font-size:13px;color:var(--muted)}.installCard button{min-height:42px;border-radius:14px;padding:0 14px;background:linear-gradient(135deg,var(--blue),#7c3aed);color:white;font-weight:900}.list{padding-bottom:112px}.row{width:calc(100% - 22px);margin:10px 11px 0;display:grid;grid-template-columns:50px 1fr 42px;align-items:center;min-height:74px;padding:10px;border:1px solid var(--line);border-radius:20px;text-align:left;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01)),var(--card);box-shadow:0 10px 28px #0003}.emoji{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;font-size:24px;background:rgba(101,116,255,.10)}.folderIcon{background:rgba(255,212,93,.12)}.rtitle{font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{margin-top:4px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub .blue{color:#91a0ff;font-weight:800}.more{width:40px;height:40px;border-radius:14px;color:var(--muted);font-size:23px}.fab{position:fixed;right:18px;bottom:24px;z-index:6;width:66px;height:66px;border-radius:24px;background:linear-gradient(135deg,var(--blue),#7c3aed);color:white;font-size:36px;box-shadow:0 18px 45px #3142ff66}.empty{padding:56px 22px;text-align:center;color:var(--muted);line-height:1.45}.empty b{display:block;color:var(--text);font-size:21px;margin-bottom:8px}.hint,.quick{margin:12px 14px 2px;padding:13px;border:1px solid var(--line);border-radius:22px;background:rgba(16,24,39,.78);color:var(--muted);font-size:13px;line-height:1.35}.quickTitle{font-weight:900;color:var(--text);margin-bottom:10px}.quickGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quickBtn{min-height:58px;border-radius:18px;border:1px solid var(--line);background:var(--card2);font-weight:900}.editor{padding:14px;display:grid;gap:12px}.ntitle{height:58px;padding:0 15px;font-size:23px;font-weight:950}.nbody{min-height:calc(100vh - 340px);resize:none;padding:15px;font-size:17px;line-height:1.5}.chips,.twobtn{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.pill{min-height:48px;border-radius:16px;background:var(--soft);font-weight:900}.danger{color:var(--red)}.status{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px}.status .okText{color:var(--green);font-weight:900}.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tool{min-height:44px;border-radius:15px;background:var(--card2);border:1px solid var(--line);color:var(--muted);font-weight:900}.bottomNav{position:fixed;left:10px;right:92px;bottom:18px;z-index:5;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px;border:1px solid var(--line);border-radius:24px;background:rgba(16,24,39,.92);backdrop-filter:blur(16px);box-shadow:0 18px 45px #0007}body.light .bottomNav{background:rgba(255,255,255,.92)}.tab{min-height:50px;border-radius:18px;color:var(--muted);font-size:12px;font-weight:900}.tab b{display:block;font-size:20px}.tab.on{background:linear-gradient(135deg,#243b89,#18285c);color:white}.shade{display:none;position:fixed;inset:0;z-index:10;background:#0009}.shade.on{display:block}.sheet,.dialog,.menu{display:none;position:fixed;z-index:11;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 45px var(--shadow)}.sheet.on,.dialog.on,.menu.on{display:block}.sheet{left:0;right:0;bottom:0;border-radius:26px 26px 0 0;padding:12px 12px max(12px,env(safe-area-inset-bottom))}.st{color:var(--muted);font-size:14px;font-weight:950;padding:8px}.act{width:100%;min-height:56px;border-radius:18px;text-align:left;padding:0 12px;font-weight:900;font-size:17px}.menu{top:0;bottom:0;left:0;width:min(86vw,350px);padding:14px}.brand{display:flex;align-items:center;gap:12px;font-size:23px;font-weight:950;padding:10px 4px 16px}.brand img{width:44px;height:44px;border-radius:14px}.menu button{width:100%;min-height:55px;border-radius:18px;text-align:left;padding:0 10px;font-weight:900}.dialog{left:14px;right:14px;top:50%;transform:translateY(-50%);border-radius:26px;padding:16px}.dialog h2{margin:0 0 8px;font-size:21px}.small{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.35}.dacts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.dacts button{min-height:50px;border-radius:17px;background:var(--soft);font-weight:950}.dacts .ok{background:linear-gradient(135deg,var(--blue),#7c3aed);color:white}.file{display:none}.toast{position:fixed;left:14px;right:14px;bottom:98px;z-index:30;display:none;padding:13px 14px;border-radius:18px;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 45px var(--shadow);color:var(--text);font-weight:850}.toast.on{display:block}@media(max-width:380px){.rtitle{font-size:16px}.top{grid-template-columns:44px 1fr 40px 40px 40px}.bottomNav{right:88px}.tab{font-size:11px}}
</style>
</head>
<body>
<header class="top">
<button class="ico" id="back" aria-label="Retour ou installer"><img src="logo.svg" alt="Bloc Noté"></button>
<div><h1 id="title">Mes dossiers</h1><div class="path" id="path">Accueil</div></div>
<button class="ico installTop" id="installTop" aria-label="Installer">📲</button>
<button class="ico" id="sbtn" aria-label="Recherche">🔍</button>
<button class="ico" id="mbtn" aria-label="Menu">☰</button>
</header>
<div class="search" id="sbox"><input id="q" type="search" placeholder="Rechercher une note, un dossier, un texte"></div>
<main class="list" id="list"></main>
<nav class="bottomNav" id="bottomNav"><button class="tab on" data-tab="home"><b>⌂</b>Dossiers</button><button class="tab" data-tab="fav"><b>☆</b>Favoris</button><button class="tab" data-tab="recent"><b>◷</b>Récents</button></nav>
<button class="fab" id="add" aria-label="Créer">+</button>
<input class="file" id="file" type="file" accept="application/json,.json">
<div class="shade" id="shade"></div>
<nav class="menu" id="menu"><div class="brand"><img src="logo.svg" alt=""><span>Bloc Noté</span></div><button data-m="home">📁 Mes dossiers</button><button data-m="fav">⭐ Favoris</button><button data-m="recent">🕘 Récents</button><button data-m="allnotes">📝 Toutes les notes</button><button data-m="install">📲 Installer l’application</button><button data-m="theme">🌓 Thème clair/sombre</button><button data-m="export">⬇️ Exporter sauvegarde</button><button data-m="import">⬆️ Importer sauvegarde</button><button data-m="reset">🧹 Vider l’application</button></nav>
<section class="sheet" id="sheet"></section>
<section class="dialog" id="dialog"><h2 id="dtitle">Créer</h2><p class="small" id="dhelp"></p><input class="name" id="dinput"><div class="dacts"><button id="cancel">Annuler</button><button class="ok" id="ok">Valider</button></div></section>
<div class="toast" id="toast"></div>
<script>
const KEY="bloc-projets-simple-v1";
const $=id=>document.getElementById(id);
const e={body:document.body,back:$('back'),title:$('title'),path:$('path'),installTop:$('installTop'),sbtn:$('sbtn'),mbtn:$('mbtn'),sbox:$('sbox'),q:$('q'),list:$('list'),bottomNav:$('bottomNav'),add:$('add'),shade:$('shade'),sheet:$('sheet'),menu:$('menu'),dialog:$('dialog'),dtitle:$('dtitle'),dhelp:$('dhelp'),dinput:$('dinput'),cancel:$('cancel'),ok:$('ok'),file:$('file'),toast:$('toast')};
let db=load(),cur="root",note=null,view="folder",send=null,saveTimer=null,toastTimer=null,deferredInstall=null;
init();
function init(){migrate();theme();render();e.sbtn.onclick=search;e.mbtn.onclick=()=>openMenu();e.installTop.onclick=installApp;e.add.onclick=createSheet;e.shade.onclick=closeAll;e.cancel.onclick=closeAll;e.ok.onclick=submit;e.q.oninput=render;e.file.onchange=importFile;document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>menuAction(b.dataset.m));document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>tabAction(b.dataset.tab));window.addEventListener('beforeinstallprompt',ev=>{ev.preventDefault();deferredInstall=ev;toast('Installation disponible avec le bouton 📲')});window.addEventListener('appinstalled',()=>{deferredInstall=null;toast('Bloc Noté est installé')});if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
function starter(){let t=now();let sk={id:id(),kind:'folder',title:'Skano premier',children:[],favorite:false,createdAt:t,updatedAt:t};sk.children.push({id:id(),kind:'folder',title:'Saison 1',children:[],favorite:false,createdAt:t,updatedAt:t});sk.children.push({id:id(),kind:'note',title:'Ciel de cendre',content:'Je marche seul sous un ciel de cendre...\n\nNote principale pour les paroles, idées de clip, SRT et versions.',favorite:true,createdAt:t,updatedAt:t});sk.children.push({id:id(),kind:'note',title:'Épisode 2',content:'Idées épisode 2.',favorite:false,createdAt:t,updatedAt:t});return{version:3,theme:'dark',root:{id:'root',kind:'folder',title:'Mes dossiers',children:[sk,{id:id(),kind:'folder',title:'Album chk Booba',children:[{id:id(),kind:'note',title:'Idée album',content:'Notes album.',favorite:false,createdAt:t,updatedAt:t}],favorite:false,createdAt:t,updatedAt:t},{id:id(),kind:'folder',title:'Prompt',children:[],favorite:false,createdAt:t,updatedAt:t},{id:id(),kind:'note',title:'Ciel de cendre srt',content:"1 00:00:00,000 --> 00:00:08,440 J'vais marcher seul sous un ciel de cendre",favorite:false,createdAt:t,updatedAt:t}],favorite:false,createdAt:t,updatedAt:t}}}
function empty(){return{version:3,theme:'dark',root:{id:'root',kind:'folder',title:'Mes dossiers',children:[],favorite:false,createdAt:now(),updatedAt:now()}}}
function load(){try{let raw=localStorage.getItem(KEY);if(!raw)return starter();let x=JSON.parse(raw);return x&&x.root?x:empty()}catch{return empty()}}
function migrate(){if(!db.version)db.version=3;walk(db.root,n=>{if(!n.createdAt)n.createdAt=now();if(!n.updatedAt)n.updatedAt=n.createdAt;if(typeof n.favorite!=="boolean")n.favorite=false;if(n.kind==="note"&&typeof n.content!=="string")n.content="";if(n.kind==="folder"&&!Array.isArray(n.children))n.children=[]});save()}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function now(){return new Date().toISOString()}function id(){return"id-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8)}
function node(i,n=db.root){if(n.id===i)return n;if(n.kind!=="folder")return null;for(const c of n.children){const f=node(i,c);if(f)return f}return null}
function parent(i,n=db.root,p=null){if(n.id===i)return p;if(n.kind!=="folder")return null;for(const c of n.children){const f=parent(i,c,n);if(f)return f}return null}
function walk(n,cb,p=null,path=[]){cb(n,p,path);if(n.kind==="folder")n.children.forEach(c=>walk(c,cb,n,[...path,n]))}
function pathOf(i){let r=[];walk(db.root,(n,p,path)=>{if(n.id===i)r=[...path,n]});return r}
function folder(){let n=node(cur);return n&&n.kind==="folder"?n:db.root}function touch(n){n.updatedAt=now();let p=parent(n.id);while(p){p.updatedAt=now();p=parent(p.id)}save()}
function setHead(t,p){e.title.textContent=t;e.path.innerHTML=p||"Accueil";headerNav()}
function headerNav(){let isHome=!note&&!e.q.value&&view==='folder'&&cur==='root';if(isHome){e.back.innerHTML='<img src="logo.svg" alt="Bloc Noté">';e.back.className='ico logoTop';e.back.onclick=installApp}else{e.back.textContent='‹';e.back.className='ico';e.back.onclick=back}}
function setTabs(){document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('on',(b.dataset.tab==='home'&&view==='folder'&&!note)||(b.dataset.tab==='fav'&&view==='fav')||(b.dataset.tab==='recent'&&view==='recent')))}
function render(){setTabs();if(note)return renderNote();let q=e.q.value.trim().toLowerCase();if(q)return renderSearch(q);if(view==="fav")return renderFav();if(view==="allnotes")return renderAllNotes();if(view==="recent")return renderRecent();view="folder";renderFolder()}
function renderHero(){let d=document.createElement('section');d.className='hero';d.innerHTML='<div class="heroTitle"><img src="logo.svg" alt=""><div><h2>Bloc Noté</h2><p>Organisez vos idées. Écrivez en toute clarté.</p></div></div><div class="installCard on"><span>Ajoute l’application sur l’écran d’accueil avec le logo.</span><button type="button">Installer</button></div>';d.querySelector('button').onclick=installApp;e.list.append(d)}
function renderFolder(){let f=folder(),p=pathOf(f.id).map(x=>x.title).join(" / ");setHead(f.title,p==="Mes dossiers"?"Accueil":"<b>"+p.replaceAll(' / ','</b> / <b>')+"</b>");e.add.style.display="grid";e.bottomNav.style.display="grid";e.list.innerHTML="";if(f.id==='root')renderHero();else quickCreate(f);let items=[...f.children].sort(sort);if(!items.length)return emptyBox("Dossier vide","Appuie sur + pour créer plusieurs notes ou un sous-dossier.");items.forEach(x=>e.list.append(row(x)))}
function quickCreate(f){let d=document.createElement('section');d.className='quick';d.innerHTML='<div class="quickTitle">Créer rapidement dans “'+esc(f.title)+'”</div><div class="quickGrid"><button class="quickBtn" type="button">📝 Nouvelle note</button><button class="quickBtn" type="button">📁 Nouveau dossier</button></div>';let bs=d.querySelectorAll('button');bs[0].onclick=()=>newNote(false);bs[1].onclick=newFolder;e.list.append(d)}
function renderFav(){setHead("Favoris","Notes et dossiers favoris");e.add.style.display="none";e.bottomNav.style.display="grid";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id!=="root"&&n.favorite)a.push({n,path})});if(!a.length)return emptyBox("Aucun favori","Ouvre une note ou un dossier puis appuie sur ⭐.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderAllNotes(){setHead("Toutes les notes","Liste complète");e.add.style.display="none";e.bottomNav.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.kind==="note")a.push({n,path})});if(!a.length)return emptyBox("Aucune note","Crée une note dans un dossier avec le bouton +.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderRecent(){setHead("Récents","Dernières modifications");e.add.style.display="none";e.bottomNav.style.display="grid";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id!=="root")a.push({n,path})});a.sort((a,b)=>new Date(b.n.updatedAt)-new Date(a.n.updatedAt));if(!a.length)return emptyBox("Aucun élément","Tes dernières notes apparaîtront ici.");a.slice(0,30).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderSearch(q){setHead("Recherche","Résultats");e.add.style.display="none";e.bottomNav.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id==="root")return;let txt=(n.title+" "+(n.content||"")+" "+path.map(x=>x.title).join(" ")).toLowerCase();if(txt.includes(q))a.push({n,path})});if(!a.length)return emptyBox("Rien trouvé","Essaie un autre mot.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderNote(){let n=node(note);if(!n){note=null;return render()}setHead(n.title,'📁 <b>'+pathOf(n.id).slice(1,-1).map(x=>x.title).join(' / ')+'</b>');e.add.style.display="none";e.bottomNav.style.display="none";e.list.innerHTML="";let box=document.createElement("section");box.className="editor";let title=document.createElement("input");title.className="ntitle";title.value=n.title;let chips=document.createElement('div');chips.className='chips';let star=btn("pill",n.favorite?"⭐ Favori":"☆ Favori");star.onclick=()=>{n.favorite=!n.favorite;touch(n);renderNote()};let copy=btn("pill","📋 Copier");copy.onclick=()=>copyText(n);let del=btn("pill danger","🗑 Suppr.");del.onclick=()=>delItem(n.id);chips.append(star,copy,del);let body=document.createElement("textarea");body.className="nbody";body.value=n.content||"";let st=document.createElement("div");st.className="status";st.innerHTML='<span class="okText">✓ Sauvegarde automatique</span><span>Modifiée maintenant</span>';let tools=document.createElement('div');tools.className='tools';['B','I','• Liste','↶ ↷'].forEach(x=>tools.append(btn('tool',x)));let auto=()=>{n.title=title.value.trim()||"Note sans titre";n.content=body.value;clearTimeout(saveTimer);saveTimer=setTimeout(()=>{touch(n);setHead(n.title,'📁 <b>'+pathOf(n.id).slice(1,-1).map(x=>x.title).join(' / ')+'</b>');st.innerHTML='<span class="okText">✓ Sauvegardé</span><span>Modifiée à '+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})+'</span>'},180)};title.oninput=auto;body.oninput=auto;box.append(title,chips,body,st,tools);e.list.append(box)}
function row(x,path){let r=document.createElement("button");r.className="row";r.onclick=()=>open(x.id);let ic=document.createElement("div");ic.className="emoji "+(x.kind==='folder'?'folderIcon':'');ic.textContent=x.kind==="folder"?"📁":"📝";let mid=document.createElement("div");let t=document.createElement("div");t.className="rtitle";t.textContent=(x.favorite?"⭐ ":"")+x.title;let s=document.createElement("div");s.className="sub";s.innerHTML=path?path.map(p=>esc(p.title)).join(" / "):x.kind==="folder"?count(x):esc(preview(x));let m=btn("more","⋮");m.onclick=ev=>{ev.stopPropagation();itemSheet(x.id)};mid.append(t,s);r.append(ic,mid,m);return r}
function preview(n){return(n.content||"").replace(/\s+/g," ").trim()||"Note vide"}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function btn(c,t){let b=document.createElement("button");b.className=c;b.textContent=t;return b}
function emptyBox(t,s){let d=document.createElement("div");d.className="empty";d.innerHTML="<b></b><span></span>";d.querySelector("b").textContent=t;d.querySelector("span").textContent=s;e.list.append(d)}
function count(f){let d=f.children.filter(x=>x.kind==="folder").length,n=f.children.filter(x=>x.kind==="note").length,a=[];if(d)a.push('<span class="blue">'+d+'</span> dossier'+(d>1?'s':''));if(n)a.push('<span class="blue">'+n+'</span> note'+(n>1?'s':''));return a.join(" · ")||"Vide"}
function sort(a,b){if(a.kind!==b.kind)return a.kind==="folder"?-1:1;return new Date(b.updatedAt)-new Date(a.updatedAt)}
function open(i){let x=node(i);if(!x)return;closeAll();view="folder";e.q.value="";e.sbox.classList.remove("on");if(x.kind==="folder"){cur=i;note=null}else note=i;render()}
function back(){if(note){let p=parent(note);note=null;cur=p?p.id:"root";view="folder";return render()}if(view!=="folder"){view="folder";cur="root";return render()}if(e.q.value){e.q.value="";return render()}if(cur!=="root"){let p=parent(cur);cur=p?p.id:"root";render()}}
function search(){closeAll();e.sbox.classList.toggle("on");if(e.sbox.classList.contains("on")){view="folder";note=null;setTimeout(()=>e.q.focus(),50)}else e.q.value="";render()}
function createSheet(){let f=folder();sheet("Créer dans “"+f.title+"”",[["📝 Nouvelle note",()=>newNote(false)],["📝 Nouvelle note et ouvrir",()=>newNote(true)],["📁 Nouveau dossier",newFolder]])}
function newFolder(){closeAll();dialog("Nom du dossier","Exemple : Saison 1","Nom du dossier",name=>{let f=folder();f.children.push({id:id(),kind:"folder",title:name,children:[],favorite:false,createdAt:now(),updatedAt:now()});touch(f);toast("Dossier créé");render()})}
function newNote(openAfter=false){closeAll();dialog("Titre de la note","Tu peux créer plusieurs notes dans le même dossier.","Exemple : Épisode 1",title=>{let f=folder(),n={id:id(),kind:"note",title,content:"",favorite:false,createdAt:now(),updatedAt:now()};f.children.push(n);touch(f);if(openAfter)note=n.id;toast(openAfter?"Note créée et ouverte":"Note créée. Tu peux en créer une autre.");render()})}
function itemSheet(i){let x=node(i);if(!x)return;let a=[[x.kind==="folder"?"📂 Ouvrir":"📝 Ouvrir",()=>open(i)],[x.favorite?"☆ Retirer des favoris":"⭐ Mettre en favori",()=>toggleFav(i)],["✏️ Renommer",()=>rename(i)]];if(x.kind==="folder")a.push(["📝 Créer une note dedans",()=>{open(i);setTimeout(()=>newNote(false),40)}],["📁 Créer un sous-dossier",()=>{open(i);setTimeout(newFolder,40)}],["📄 Dupliquer le dossier",()=>copyFolder(i)]);if(x.kind==="note")a.push(["📄 Dupliquer la note",()=>copyNote(i)],["📋 Copier le texte",()=>copyText(x)]);a.push(["🗑️ Supprimer",()=>delItem(i),"danger"]);sheet(x.title,a)}
function sheet(t,a){e.sheet.innerHTML="";let st=document.createElement("div");st.className="st";st.textContent=t;e.sheet.append(st);a.forEach(([txt,fn,d])=>{let b=btn("act "+(d||""),txt);b.onclick=fn;e.sheet.append(b)});let c=btn("act","Annuler");c.onclick=closeAll;e.sheet.append(c);e.shade.classList.add("on");e.sheet.classList.add("on")}
function toggleFav(i){let x=node(i);if(!x)return;x.favorite=!x.favorite;touch(x);closeAll();render()}
function rename(i){let x=node(i);if(!x)return;closeAll();dialog("Renommer","","Nouveau nom",name=>{x.title=name;touch(x);render()},x.title)}
function cloneNode(n){let c=JSON.parse(JSON.stringify(n));function renew(x){x.id=id();x.favorite=false;x.createdAt=now();x.updatedAt=now();if(x.kind==="folder")x.children.forEach(renew)}renew(c);c.title=n.title+" - copie";return c}
function copyNote(i){let n=node(i),p=parent(i);if(!n||!p)return;p.children.push(cloneNode(n));touch(p);closeAll();toast("Note dupliquée");render()}
function copyFolder(i){let n=node(i),p=parent(i);if(!n||!p)return;p.children.push(cloneNode(n));touch(p);closeAll();toast("Dossier dupliqué avec ses notes");render()}
async function copyText(n){let txt=n.content||"";try{await navigator.clipboard.writeText(txt);toast("Texte copié")}catch{toast("Copie impossible sur ce navigateur")}closeAll()}
function delItem(i){let x=node(i),p=parent(i);if(!x||!p)return;if(!confirm(x.kind==="folder"?"Supprimer ce dossier et tout son contenu ?":"Supprimer cette note ?"))return;p.children=p.children.filter(c=>c.id!==i);touch(p);if(note===i)note=null;cur=p.id;view="folder";closeAll();render()}
function dialog(t,help,ph,fn,preset){send=fn;e.dtitle.textContent=t;e.dhelp.textContent=help||"";e.dinput.value=preset||"";e.dinput.placeholder=ph||"";e.shade.classList.add("on");e.dialog.classList.add("on");setTimeout(()=>{e.dinput.focus();e.dinput.select()},50)}
function submit(){let v=e.dinput.value.trim();if(!v)return e.dinput.focus();let fn=send;closeAll();if(fn)fn(v)}
function openMenu(){closeAll();e.shade.classList.add("on");e.menu.classList.add("on")}
function tabAction(a){closeAll();if(a==='home'){view='folder';note=null;cur='root';e.q.value='';e.sbox.classList.remove('on')}if(a==='fav'){view='fav';note=null}if(a==='recent'){view='recent';note=null}render()}
function menuAction(a){closeAll();if(a==="home"){view="folder";note=null;cur="root";e.q.value="";e.sbox.classList.remove("on");render()}if(a==="fav"){view="fav";note=null;render()}if(a==="recent"){view="recent";note=null;render()}if(a==="allnotes"){view="allnotes";note=null;e.q.value="";e.sbox.classList.remove("on");render()}if(a==="install")installApp();if(a==="theme"){db.theme=db.theme==="light"?"dark":"light";theme();save();render()}if(a==="export")exportFile();if(a==="import")e.file.click();if(a==="reset")reset()}
function installApp(){closeAll();if(deferredInstall){deferredInstall.prompt();deferredInstall.userChoice.finally(()=>{deferredInstall=null});return}sheet('Installer Bloc Noté',[["📲 Android : appuie sur les 3 points Chrome",()=>{}],["➕ Puis choisis “Ajouter à l’écran d’accueil”",()=>{}],["✅ Le logo Bloc Noté sera sur ton téléphone",()=>{}]])}
function theme(){e.body.classList.toggle("light",db.theme==="light")}
function exportFile(){let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="bloc-note-sauvegarde-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url)}
function importFile(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let x=JSON.parse(r.result);if(!x.root||x.root.kind!=="folder")return alert("Sauvegarde invalide.");if(!confirm("Remplacer toutes les notes par cette sauvegarde ?"))return;db=x;cur="root";note=null;view="folder";save();migrate();theme();render()}catch{alert("Impossible de lire ce fichier.")}finally{e.file.value=""}};r.readAsText(f)}
function reset(){if(!confirm("Vider toute l’application ? Fais une sauvegarde avant si besoin."))return;db=empty();cur="root";note=null;view="folder";save();theme();render()}
function closeAll(){e.shade.classList.remove("on");e.sheet.classList.remove("on");e.menu.classList.remove("on");e.dialog.classList.remove("on")}
function toast(msg){clearTimeout(toastTimer);e.toast.textContent=msg;e.toast.classList.add("on");toastTimer=setTimeout(()=>e.toast.classList.remove("on"),2300)}
</script>
</body>
</html>
