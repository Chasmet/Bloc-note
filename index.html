<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>Bloc Projets</title>
<style>
:root{--bg:#0f172a;--card:#111827;--soft:#1f2937;--text:#f9fafb;--muted:#9ca3af;--line:#293447;--blue:#6366f1;--red:#ef4444}body.light{--bg:#f3f4f6;--card:#fff;--soft:#e8ecff;--text:#111827;--muted:#606b80;--line:#d8deea;--blue:#4f46e5;--red:#dc2626}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif}button,input,textarea{font:inherit}button{border:0;background:none;color:inherit}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:46px 1fr 46px 46px;gap:2px;align-items:center;min-height:62px;padding:8px;background:var(--card);border-bottom:1px solid var(--line)}.ico{width:44px;height:44px;border-radius:14px;font-size:23px}.ico:active,.row:active,.act:active,.menu button:active{background:var(--soft)}h1{margin:0;font-size:19px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.path{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.search{display:none;background:var(--card);padding:10px;border-bottom:1px solid var(--line)}.search.on{display:block}.search input,.name,.ntitle,.nbody{width:100%;border:1px solid var(--line);border-radius:16px;background:var(--soft);color:var(--text);outline:0}.search input,.name{height:50px;padding:0 14px}.list{padding-bottom:95px}.row{width:100%;display:grid;grid-template-columns:46px 1fr 44px;align-items:center;min-height:72px;padding:9px 8px 9px 14px;border-bottom:1px solid var(--line);text-align:left}.emoji{font-size:27px}.rtitle{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{margin-top:4px;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.more{width:42px;height:42px;border-radius:14px;color:var(--muted);font-size:24px}.fab{position:fixed;right:18px;bottom:22px;z-index:6;width:64px;height:64px;border-radius:22px;background:var(--blue);color:white;font-size:34px;box-shadow:0 18px 45px #0007}.empty{padding:60px 22px;text-align:center;color:var(--muted);line-height:1.45}.empty b{display:block;color:var(--text);font-size:20px;margin-bottom:8px}.editor{padding:14px;display:grid;gap:12px}.ntitle{height:54px;padding:0 14px;font-size:21px;font-weight:800}.nbody{min-height:calc(100vh - 235px);resize:none;padding:14px;font-size:17px;line-height:1.45}.twobtn{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pill{min-height:48px;border-radius:16px;background:var(--soft);font-weight:700}.status{color:var(--muted);font-size:13px}.shade{display:none;position:fixed;inset:0;z-index:10;background:#0008}.shade.on{display:block}.sheet,.dialog,.menu{display:none;position:fixed;z-index:11;background:var(--card);border:1px solid var(--line);box-shadow:0 18px 45px #0008}.sheet.on,.dialog.on,.menu.on{display:block}.sheet{left:0;right:0;bottom:0;border-radius:24px 24px 0 0;padding:12px}.st{color:var(--muted);font-size:14px;font-weight:800;padding:8px}.act{width:100%;min-height:54px;border-radius:16px;text-align:left;padding:0 12px;font-weight:700;font-size:17px}.danger{color:var(--red)}.menu{top:0;bottom:0;left:0;width:min(84vw,330px);padding:14px}.brand{font-size:22px;font-weight:900;padding:10px 4px 16px}.menu button{width:100%;min-height:54px;border-radius:16px;text-align:left;padding:0 10px;font-weight:700}.dialog{left:14px;right:14px;top:50%;transform:translateY(-50%);border-radius:24px;padding:16px}.dialog h2{margin:0 0 12px;font-size:20px}.dacts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.dacts button{min-height:48px;border-radius:16px;background:var(--soft);font-weight:800}.dacts .ok{background:var(--blue);color:white}.file{display:none}
</style>
</head>
<body>
<header class="top">
<button class="ico" id="back">‹</button>
<div><h1 id="title">Mes dossiers</h1><div class="path" id="path">Accueil</div></div>
<button class="ico" id="sbtn">🔍</button><button class="ico" id="mbtn">☰</button>
</header>
<div class="search" id="sbox"><input id="q" type="search" placeholder="Rechercher"></div>
<main class="list" id="list"></main>
<button class="fab" id="add">+</button>
<input class="file" id="file" type="file" accept="application/json,.json">
<div class="shade" id="shade"></div>
<nav class="menu" id="menu"><div class="brand">Bloc Projets</div><button data-m="home">📁 Mes dossiers</button><button data-m="fav">⭐ Favoris</button><button data-m="theme">🌓 Thème clair/sombre</button><button data-m="export">⬇️ Exporter sauvegarde</button><button data-m="import">⬆️ Importer sauvegarde</button><button data-m="reset">🧹 Vider l’application</button></nav>
<section class="sheet" id="sheet"></section>
<section class="dialog" id="dialog"><h2 id="dtitle">Créer</h2><input class="name" id="dinput"><div class="dacts"><button id="cancel">Annuler</button><button class="ok" id="ok">Valider</button></div></section>
<script>
const KEY="bloc-projets-simple-v1";
const $=id=>document.getElementById(id);
const e={body:document.body,back:$('back'),title:$('title'),path:$('path'),sbtn:$('sbtn'),mbtn:$('mbtn'),sbox:$('sbox'),q:$('q'),list:$('list'),add:$('add'),shade:$('shade'),sheet:$('sheet'),menu:$('menu'),dialog:$('dialog'),dtitle:$('dtitle'),dinput:$('dinput'),cancel:$('cancel'),ok:$('ok'),file:$('file')};
let db=load(),cur="root",note=null,fav=false,send=null,timer=null;
init();
function init(){theme();render();e.back.onclick=back;e.sbtn.onclick=search;e.mbtn.onclick=()=>openMenu();e.add.onclick=createSheet;e.shade.onclick=closeAll;e.cancel.onclick=closeAll;e.ok.onclick=submit;e.q.oninput=render;e.file.onchange=importFile;document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>menuAction(b.dataset.m));}
function empty(){return{version:1,theme:"dark",root:{id:"root",kind:"folder",title:"Mes dossiers",children:[],favorite:false,createdAt:now(),updatedAt:now()}}}
function load(){try{let x=JSON.parse(localStorage.getItem(KEY));return x&&x.root?x:empty()}catch{return empty()}}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function now(){return new Date().toISOString()}function id(){return"id-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8)}
function node(i,n=db.root){if(n.id===i)return n;if(n.kind!=="folder")return null;for(const c of n.children){const f=node(i,c);if(f)return f}return null}
function parent(i,n=db.root,p=null){if(n.id===i)return p;if(n.kind!=="folder")return null;for(const c of n.children){const f=parent(i,c,n);if(f)return f}return null}
function walk(n,cb,p=null,path=[]){cb(n,p,path);if(n.kind==="folder")n.children.forEach(c=>walk(c,cb,n,[...path,n]))}
function pathOf(i){let r=[];walk(db.root,(n,p,path)=>{if(n.id===i)r=[...path,n]});return r}
function folder(){let n=node(cur);return n&&n.kind==="folder"?n:db.root}function touch(n){n.updatedAt=now();let p=parent(n.id);if(p)p.updatedAt=now();save()}
function head(t,p){e.title.textContent=t;e.path.textContent=p||"Accueil"}
function render(){if(note)return renderNote();let q=e.q.value.trim().toLowerCase();if(q)return renderSearch(q);if(fav)return renderFav();renderFolder()}
function renderFolder(){let f=folder();head(f.title,pathOf(f.id).map(x=>x.title).join(" / ")==="Mes dossiers"?"Accueil":pathOf(f.id).map(x=>x.title).join(" / "));e.add.style.display="grid";e.list.innerHTML="";let items=[...f.children].sort(sort);if(!items.length)return emptyBox("Dossier vide","Appuie sur + pour créer un dossier ou une note.");items.forEach(x=>e.list.append(row(x)))}
function renderFav(){head("Favoris","Notes et dossiers favoris");e.add.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id!=="root"&&n.favorite)a.push({n,path})});if(!a.length)return emptyBox("Aucun favori","Ouvre une note ou un dossier puis appuie sur ⭐.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderSearch(q){head("Recherche","Résultats");e.add.style.display="none";e.list.innerHTML="";let a=[];walk(db.root,(n,p,path)=>{if(n.id==="root")return;let txt=(n.title+" "+(n.content||"")+" "+path.map(x=>x.title).join(" ")).toLowerCase();if(txt.includes(q))a.push({n,path})});if(!a.length)return emptyBox("Rien trouvé","Essaie un autre mot.");a.sort((a,b)=>sort(a.n,b.n)).forEach(x=>e.list.append(row(x.n,x.path)))}
function renderNote(){let n=node(note);if(!n){note=null;return render()}head(n.title,pathOf(n.id).map(x=>x.title).join(" / "));e.add.style.display="none";e.list.innerHTML="";let box=document.createElement("section");box.className="editor";let title=document.createElement("input");title.className="ntitle";title.value=n.title;let body=document.createElement("textarea");body.className="nbody";body.value=n.content||"";let tools=document.createElement("div");tools.className="twobtn";let star=btn("pill",n.favorite?"⭐ Favori":"☆ Favori");star.onclick=()=>{n.favorite=!n.favorite;touch(n);renderNote()};let del=btn("pill danger","Supprimer");del.onclick=()=>delItem(n.id);let st=document.createElement("div");st.className="status";st.textContent="Sauvegarde automatique";let auto=()=>{n.title=title.value.trim()||"Note sans titre";n.content=body.value;clearTimeout(timer);timer=setTimeout(()=>{touch(n);head(n.title,pathOf(n.id).map(x=>x.title).join(" / "));st.textContent="Sauvegardé à "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})},200)};title.oninput=auto;body.oninput=auto;tools.append(star,del);box.append(title,body,tools,st);e.list.append(box)}
function row(x,path){let r=document.createElement("button");r.className="row";r.onclick=()=>open(x.id);let ic=document.createElement("div");ic.className="emoji";ic.textContent=x.kind==="folder"?"📁":"📝";let mid=document.createElement("div");let t=document.createElement("div");t.className="rtitle";t.textContent=(x.favorite?"⭐ ":"")+x.title;let s=document.createElement("div");s.className="sub";s.textContent=path?path.map(p=>p.title).join(" / "):x.kind==="folder"?count(x):(x.content||"").replace(/\s+/g," ").trim()||"Note vide";let m=btn("more","⋮");m.onclick=ev=>{ev.stopPropagation();itemSheet(x.id)};mid.append(t,s);r.append(ic,mid,m);return r}
function btn(c,t){let b=document.createElement("button");b.className=c;b.textContent=t;return b}
function emptyBox(t,s){let d=document.createElement("div");d.className="empty";d.innerHTML="<b></b><span></span>";d.querySelector("b").textContent=t;d.querySelector("span").textContent=s;e.list.append(d)}
function count(f){let d=f.children.filter(x=>x.kind==="folder").length,n=f.children.filter(x=>x.kind==="note").length,a=[];if(d)a.push(d+" dossier"+(d>1?"s":""));if(n)a.push(n+" note"+(n>1?"s":""));return a.join(" · ")||"Vide"}
function sort(a,b){if(a.kind!==b.kind)return a.kind==="folder"?-1:1;return new Date(b.updatedAt)-new Date(a.updatedAt)}
function open(i){let x=node(i);if(!x)return;closeAll();fav=false;e.q.value="";e.sbox.classList.remove("on");if(x.kind==="folder"){cur=i;note=null}else note=i;render()}
function back(){if(note){let p=parent(note);note=null;cur=p?p.id:"root";return render()}if(fav){fav=false;cur="root";return render()}if(e.q.value){e.q.value="";return render()}if(cur!=="root"){let p=parent(cur);cur=p?p.id:"root";render()}}
function search(){closeAll();e.sbox.classList.toggle("on");if(e.sbox.classList.contains("on")){fav=false;note=null;setTimeout(()=>e.q.focus(),50)}else e.q.value="";render()}
function createSheet(){let f=folder();sheet("Créer dans “"+f.title+"”",[["📁 Nouveau dossier",newFolder],["📝 Nouvelle note",newNote]])}
function newFolder(){closeAll();dialog("Nom du dossier","",name=>{let f=folder();f.children.push({id:id(),kind:"folder",title:name,children:[],favorite:false,createdAt:now(),updatedAt:now()});touch(f);render()})}
function newNote(){closeAll();dialog("Titre de la note","",title=>{let f=folder(),n={id:id(),kind:"note",title,content:"",favorite:false,createdAt:now(),updatedAt:now()};f.children.push(n);touch(f);note=n.id;render()})}
function itemSheet(i){let x=node(i);if(!x)return;let a=[[x.kind==="folder"?"📂 Ouvrir":"📝 Ouvrir",()=>open(i)],[x.favorite?"☆ Retirer des favoris":"⭐ Mettre en favori",()=>toggleFav(i)],["✏️ Renommer",()=>rename(i)]];if(x.kind==="note")a.push(["📄 Dupliquer",()=>copyNote(i)]);a.push(["🗑️ Supprimer",()=>delItem(i),"danger"]);sheet(x.title,a)}
function sheet(t,a){e.sheet.innerHTML="";let st=document.createElement("div");st.className="st";st.textContent=t;e.sheet.append(st);a.forEach(([txt,fn,d])=>{let b=btn("act "+(d||""),txt);b.onclick=fn;e.sheet.append(b)});let c=btn("act","Annuler");c.onclick=closeAll;e.sheet.append(c);e.shade.classList.add("on");e.sheet.classList.add("on")}
function toggleFav(i){let x=node(i);x.favorite=!x.favorite;touch(x);closeAll();render()}
function rename(i){let x=node(i);closeAll();dialog("Renommer",x.title,name=>{x.title=name;touch(x);render()})}
function copyNote(i){let n=node(i),p=parent(i);if(!n||!p)return;let c={...n,id:id(),title:n.title+" - copie",favorite:false,createdAt:now(),updatedAt:now()};p.children.push(c);touch(p);closeAll();render()}
function delItem(i){let x=node(i),p=parent(i);if(!x||!p)return;if(!confirm(x.kind==="folder"?"Supprimer ce dossier et tout son contenu ?":"Supprimer cette note ?"))return;p.children=p.children.filter(c=>c.id!==i);touch(p);if(note===i)note=null;cur=p.id;closeAll();render()}
function dialog(t,v,fn){send=fn;e.dtitle.textContent=t;e.dinput.value=v||"";e.shade.classList.add("on");e.dialog.classList.add("on");setTimeout(()=>e.dinput.focus(),50)}
function submit(){let v=e.dinput.value.trim();if(!v)return e.dinput.focus();let fn=send;closeAll();if(fn)fn(v)}
function openMenu(){closeAll();e.shade.classList.add("on");e.menu.classList.add("on")}
function menuAction(a){closeAll();if(a==="home"){fav=false;note=null;cur="root";e.q.value="";e.sbox.classList.remove("on");render()}if(a==="fav"){fav=true;note=null;e.q.value="";e.sbox.classList.remove("on");render()}if(a==="theme"){db.theme=db.theme==="light"?"dark":"light";theme();save();render()}if(a==="export")exportFile();if(a==="import")e.file.click();if(a==="reset")reset()}
function theme(){e.body.classList.toggle("light",db.theme==="light")}
function exportFile(){let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="bloc-projets-sauvegarde-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url)}
function importFile(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let x=JSON.parse(r.result);if(!x.root||x.root.kind!=="folder")return alert("Sauvegarde invalide.");if(!confirm("Remplacer toutes les notes par cette sauvegarde ?"))return;db=x;cur="root";note=null;fav=false;save();theme();render()}catch{alert("Impossible de lire ce fichier.")}finally{e.file.value=""}};r.readAsText(f)}
function reset(){if(!confirm("Vider toute l’application ? Fais une sauvegarde avant si besoin."))return;db=empty();cur="root";note=null;fav=false;save();theme();render()}
function closeAll(){e.shade.classList.remove("on");e.sheet.classList.remove("on");e.menu.classList.remove("on");e.dialog.classList.remove("on")}
</script>
</body>
</html>
